
<!--
ملاحظة:
 متخصصه لتحليل محتوى روابط الاحتيال dataset بسبب عدم توفر 
وعدم توفر عدد كافٍ من روابط التصيد الحقيقية، قمنا
قمنا بإنشاء صفحات وروابط تجريبية لمحاكاة سيناريوهات مختلفة
خاصه بالمشروع datasetواستخدمناها لاختبار النظام وبناء 
يمكن الاستفادة منها في تدريب النموذج
-->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تأكيد بيانات الدفع</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f4f6f8;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }

    .payment-box{
      width:420px;
      background:white;
      padding:32px;
      border-radius:18px;
      box-shadow:0 15px 40px rgba(0,0,0,.12);
    }

    h1{
      margin-top:0;
      color:#b42318;
    }

    .warning{
      background:#fff1f0;
      color:#b42318;
      padding:14px;
      border-radius:10px;
      font-weight:bold;
      line-height:1.7;
      margin-bottom:20px;
    }

    label{
      display:block;
      margin:14px 0 7px;
      font-weight:bold;
    }

    input{
      width:100%;
      height:46px;
      box-sizing:border-box;
      border:1px solid #ccd3da;
      border-radius:9px;
      padding:0 12px;
      font-size:15px;
    }

    button{
      width:100%;
      height:48px;
      margin-top:22px;
      border:0;
      border-radius:10px;
      background:#b42318;
      color:white;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

  <div class="payment-box">

    <h1>تحقق من حسابك فورًا</h1>

    <div class="warning">
      عاجل: يجب تحديث بياناتك خلال 24 ساعة،
      وإلا سيتم إيقاف حسابك وتعليق عملية الدفع.
    </div>

    <label>رقم الهوية</label>
    <input
      type="text"
      name="national_id"
      placeholder="رقم الهوية الوطنية"
    >

    <label>رقم البطاقة</label>
    <input
      type="text"
      name="card_number"
      placeholder="رقم البطاقة"
      autocomplete="cc-number"
    >

    <label>رمز CVV</label>
    <input
      type="text"
      name="cvv"
      placeholder="CVV"
      autocomplete="cc-csc"
    >

    <label>رمز OTP</label>
    <input
      type="text"
      name="otp"
      placeholder="OTP - رمز التحقق"
    >

    <label>كلمة المرور</label>
    <input
      type="password"
      name="password"
      placeholder="كلمة المرور"
      autocomplete="current-password"
    >

    <button type="button">
      تأكيد وتحديث الحساب
    </button>

  </div>

</body>
</html>
