
<!--
ملاحظة:
 متخصصه لتحليل محتوى روابط الاحتيال dataset بسبب عدم توفر 
وعدم توفر عدد كافٍ من روابط التصيد الحقيقية، قمنا
قمنا بإنشاء صفحات وروابط تجريبية لمحاكاة سيناريوهات مختلفة
خاصه بالمشروع datasetواستخدمناها لاختبار النظام وبناء 
يمكن الاستفادة منها في تدريب النموذج
-->
<!--
صفحة تجريبية آمنة مخصصة لاختبار AmanCheck.
لا ترسل أو تخزن أي بيانات حقيقية.
example.invalid نطاق تجريبي غير قابل للوصول.
-->

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    تحقق أمني عاجل من الحساب والدفع
  </title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      font-family: Arial, sans-serif;

      background:
        linear-gradient(
          135deg,
          #f4f6f8,
          #eef1f5
        );
    }

    .payment-box {
      width: 420px;

      padding: 32px;

      background: white;

      border-radius: 18px;

      box-shadow:
        0 15px 40px
        rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin-top: 0;

      color: #b42318;
    }

    .warning {
      margin-bottom: 20px;

      padding: 14px;

      border: 1px solid #f5b7b1;
      border-radius: 10px;

      background: #fff1f0;
      color: #b42318;

      font-weight: bold;
      line-height: 1.8;
    }

    .timer {
      margin-bottom: 18px;

      padding: 12px;

      border-radius: 10px;

      background: #fff6d8;
      color: #8a4b00;

      text-align: center;
      font-weight: bold;
    }

    label {
      display: block;

      margin: 14px 0 7px;

      font-weight: bold;
    }

    input {
      width: 100%;
      height: 46px;

      box-sizing: border-box;

      padding: 0 12px;

      border: 1px solid #ccd3da;
      border-radius: 9px;

      font-size: 15px;
    }

    button {
      width: 100%;
      height: 48px;

      margin-top: 22px;

      border: 0;
      border-radius: 10px;

      background: #b42318;
      color: white;

      font-size: 17px;
      font-weight: bold;

      cursor: pointer;
    }

    .notice {
      margin-top: 18px;

      color: #777;

      font-size: 12px;
      line-height: 1.6;
      text-align: center;
    }

    .hidden-test-form {
      display: none;
    }
  </style>
</head>

<body>

  <div class="payment-box">

    <h1>
      تحقق من حسابك فورًا
    </h1>

    <div class="warning">
      عاجل: يجب تحديث بياناتك خلال 24 ساعة،
      وإلا سيتم إيقاف حسابك وحظر عملية الدفع.

      <br>

      هذه آخر محاولة لتأكيد هويتك.
    </div>

    <div class="timer">
      يجب إكمال التحقق فورًا لتجنب تعليق الحساب.
    </div>

    <!--
      نموذج خارجي تجريبي.
      النطاق example.invalid لا يعمل فعليًا.
    -->
    <form
      id="paymentForm"
      action="https://collector.example.invalid/verify"
      method="post"
      onsubmit="return false;"
    >

      <label for="national_id">
        رقم الهوية الوطنية
      </label>

      <input
        id="national_id"
        type="text"
        name="national_id"
        placeholder="رقم الهوية الوطنية"
        autocomplete="off"
      >


      <label for="email">
        البريد الإلكتروني
      </label>

      <input
        id="email"
        type="email"
        name="email"
        placeholder="البريد الإلكتروني"
        autocomplete="email"
      >


      <label for="phone">
        رقم الجوال
      </label>

      <input
        id="phone"
        type="tel"
        name="phone"
        placeholder="رقم الجوال"
        autocomplete="tel"
      >


      <label for="card_number">
        رقم البطاقة
      </label>

      <input
        id="card_number"
        type="text"
        name="card_number"
        placeholder="رقم البطاقة"
        autocomplete="cc-number"
      >


      <label for="expiry">
        تاريخ انتهاء البطاقة
      </label>

      <input
        id="expiry"
        type="text"
        name="expiry"
        placeholder="شهر / سنة"
        autocomplete="cc-exp"
      >


      <label for="cvv">
        رمز CVV
      </label>

      <input
        id="cvv"
        type="text"
        name="cvv"
        placeholder="CVV - رمز الأمان"
        autocomplete="cc-csc"
      >


      <label for="otp">
        رمز OTP
      </label>

      <input
        id="otp"
        type="text"
        name="otp"
        placeholder="OTP - رمز التحقق"
        autocomplete="one-time-code"
      >


      <label for="password">
        كلمة مرور الحساب
      </label>

      <input
        id="password"
        type="password"
        name="password"
        placeholder="كلمة المرور"
        autocomplete="current-password"
      >


      <!-- حقول مخفية مخصصة لاختبار نظام الكشف -->

      <input
        type="hidden"
        name="session_token"
        value="demo-token-01"
      >

      <input
        type="hidden"
        name="transaction_id"
        value="demo-transaction"
      >

      <input
        type="hidden"
        name="merchant_id"
        value="demo-merchant"
      >

      <input
        type="hidden"
        name="account_reference"
        value="demo-account"
      >

      <input
        type="hidden"
        name="device_identifier"
        value="demo-device"
      >

      <input
        type="hidden"
        name="security_reference"
        value="demo-security"
      >

      <input
        type="hidden"
        name="verification_reference"
        value="demo-verification"
      >

      <input
        type="hidden"
        name="payment_reference"
        value="demo-payment"
      >

      <input
        type="hidden"
        name="redirect_reference"
        value="demo-redirect"
      >

      <input
        type="hidden"
        name="browser_reference"
        value="demo-browser"
      >

      <input
        type="hidden"
        name="tracking_reference"
        value="demo-tracking"
      >

      <input
        type="hidden"
        name="hidden_security_code"
        value="demo-code"
      >

      <input
        type="hidden"
        name="hidden_identity_reference"
        value="demo-identity"
      >

      <button
        type="button"
        onclick="showDemoMessage()"
      >
        تأكيد وتحديث الحساب فورًا
      </button>

    </form>


    <!-- نموذج مخفي خارجي لاختبار hidden_forms_count -->

    <form
      class="hidden-test-form"
      action="https://hidden.example.invalid/collect"
      method="post"
      onsubmit="return false;"
    >

      <input
        type="hidden"
        name="hidden_form_token"
        value="demo-only"
      >

    </form>


    <div class="notice">
      هذه صفحة تجريبية فقط لاختبار نظام AmanCheck،
      ولا يتم إرسال أو تخزين أي بيانات.
    </div>

  </div>


  <script>
    function showDemoMessage() {
      alert(
        "صفحة تجريبية فقط — لم يتم إرسال أي بيانات."
      );
    }
  </script>

</body>

</html>
